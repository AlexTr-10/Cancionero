name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    - name: Create Dummy Google Services & Env
      run: |
        if [ ! -f "app/google-services.json" ]; then
          echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.example.app"}},"oauth_client":[],"api_key":[{"current_key":"dummy"}],"services":{"analytics_service":{"status":1}}}]}' > app/google-services.json
        fi
        echo "GEMINI_API_KEY=AIzaSyDummyKeyForBuildOnly12345" > .env
        echo "GEMINI_API_KEY=AIzaSyDummyKeyForBuildOnly12345" >> local.properties

    - name: Build APK with Gradle
      env:
        GEMINI_API_KEY: "AIzaSyDummyKeyForBuildOnly12345"
      run: gradle assembleDebug -x validateSigningDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Secretaria-Eclesiastica-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
