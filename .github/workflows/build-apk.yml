name: Compilar APK y Desplegar Web de Cancionero

on:
  push:
    branches: [ "main", "principal" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generar Keystore de Depuración Temporal
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Compilar APK (Debug)
      run: gradle assembleDebug -x :app:processDebugGoogleServices

    - name: Subir APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: Cancionero-App-Debug
        path: |
          **/build/outputs/apk/debug/*.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compilar Distribución Web (Ver error real)
      run: |
        gradle wasmJsBrowserDistribution --no-daemon --stacktrace

    - name: Configurar Páginas de GitHub
      uses: actions/configure-pages@v4

    - name: Subir Artefacto de la Web
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'build/dist/wasmJs/productionExecutable'

  deploy-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-web
    steps:
    - name: Desplegar a GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
