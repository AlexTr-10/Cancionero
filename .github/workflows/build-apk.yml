name: Compilar APK y Desplegar Web de Cancionero

on:
  push:
    branches: [ "main", "principal" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generar Keystore de Depuración Temporal
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Compilar APK (Debug)
      run: gradle assembleDebug -x :app:processDebugGoogleServices

    - name: Subir APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: Cancionero-App-Debug
        path: |
          **/build/outputs/apk/debug/*.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compilar Distribución Web
      run: |
        gradle wasmJsBrowserDistribution --no-daemon || gradle jsBrowserDistribution --no-daemon || true

    - name: Localizar y Organizar Carpeta Web
      run: |
        mkdir -p dist-web
        # Busca recursivamente la carpeta de salida de produccion y copia su contenido
        TARGET_DIR=$(find . -type d -path "*/build/dist/wasmJs/productionExecutable" | head -n 1)
        if [ -z "$TARGET_DIR" ]; then
          TARGET_DIR=$(find . -type d -path "*/build/dist/js/productionExecutable" | head -n 1)
        fi
        
        if [ -n "$TARGET_DIR" ]; then
          echo "Carpeta de distribucion encontrada en: $TARGET_DIR"
          cp -r "$TARGET_DIR"/* dist-web/
        else
          echo "ERROR: No se encontro ninguna carpeta de distribucion compatible."
          exit 1
        fi

    - name: Configurar Páginas de GitHub
      uses: actions/configure-pages@v4

    - name: Subir Artefacto de la Web
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'dist-web'

  deploy-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-web
    steps:
    - name: Desplegar a GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
