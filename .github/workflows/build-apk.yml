name: Compilar APK y Desplegar Web de Cancionero

on:
  push:
    branches: [ "main", "principal" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generar Keystore de Depuración Temporal
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Compilar APK (Debug)
      run: gradle assembleDebug -x :app:processDebugGoogleServices

    - name: Subir APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: Cancionero-App-Debug
        path: |
          **/build/outputs/apk/debug/*.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Detectar y Compilar Distribución Web
      run: |
        echo "--- BUSCANDO TAREAS DE GRADLE DISPONIBLES ---"
        # Usamos gradle global para listar las tareas de distribucion
        gradle tasks --all | grep -i "Distribution" || true
        
        echo "--- EJECUTANDO COMPILACION COMPATIBLE ---"
        # Intentamos ejecutar las tareas usando gradle global
        if gradle :composeApp:wasmJsBrowserDistribution --no-daemon; then
          echo "Compilado con éxito usando :composeApp:wasmJsBrowserDistribution"
        elif gradle :composeApp:jsBrowserDistribution --no-daemon; then
          echo "Compilado con éxito usando :composeApp:jsBrowserDistribution"
        elif gradle wasmJsBrowserDistribution --no-daemon; then
          echo "Compilado con éxito usando wasmJsBrowserDistribution de raíz"
        elif gradle jsBrowserDistribution --no-daemon; then
          echo "Compilado con éxito usando jsBrowserDistribution de raíz"
        else
          echo "Intentando compilación genérica de producción..."
          gradle browserDistribution --no-daemon || gradle distZip --no-daemon || exit 1
        fi

    - name: Localizar y Organizar Carpeta Web
      run: |
        mkdir -p dist-web
        echo "--- BUSCANDO INDEX.HTML GENERADO ---"
        # Busca recursivamente el directorio donde se generó el index.html de producción
        HTML_PATH=$(find . -name "index.html" -path "*/build/*" -not -path "*/reports/*" | head -n 1)
        
        if [ -n "$HTML_PATH" ]; then
          TARGET_DIR=$(dirname "$HTML_PATH")
          echo "¡Archivos web encontrados en: $TARGET_DIR!"
          cp -r "$TARGET_DIR"/* dist-web/
        else
          echo "ERROR: No se encontró ningún archivo index.html en los directorios de compilación."
          exit 1
        fi

    - name: Configurar Páginas de GitHub
      uses: actions/configure-pages@v4

    - name: Subir Artefacto de la Web
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'dist-web'

  deploy-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-web
    steps:
    - name: Desplegar a GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
